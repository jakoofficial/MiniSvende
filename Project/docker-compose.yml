services:
  mysql:
    image: mysql:latest
    container_name: mintyMysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=admin
      - MYSQL_DATABASE=minty
    volumes:
      - mintyData:/var/lib/mysql
    networks:
      - app-network
    restart: unless-stopped
  backend:
    build:
      ./
    container_name: mintyBackend
    ports:
      - "8000:8000"
    networks:
      - app-network
    restart: unless-stopped
  
networks:
  app-network:
volumes:
  mintyData: